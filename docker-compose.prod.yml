# MyCosmetics Production Docker Compose
# Usage: docker-compose -f docker-compose.prod.yml up -d
# All secrets via environment variables — NEVER hardcode here.
# Use a .env.prod file (gitignored) or Docker secrets in Swarm mode.

version: '3.9'

services:

  # ── Postgres ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-mycosmetics}
      POSTGRES_USER:     ${POSTGRES_USER:-mycosmetics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mycosmetics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ── Serverpod API Server ───────────────────────────────────────────────────
  api:
    build:
      context: ./mycosmetics_server
      dockerfile: Dockerfile
    restart: always
    environment:
      SERVERPOD_DATABASE_HOST:     postgres
      SERVERPOD_DATABASE_PORT:     5432
      SERVERPOD_DATABASE_NAME:     ${POSTGRES_DB:-mycosmetics}
      SERVERPOD_DATABASE_USER:     ${POSTGRES_USER:-mycosmetics}
      SERVERPOD_DATABASE_PASS:     ${POSTGRES_PASSWORD}
      SERVERPOD_REDIS_HOST:        redis
      SERVERPOD_REDIS_PORT:        6379
      SERVERPOD_REDIS_PASSWORD:    ${REDIS_PASSWORD}
      SERVERPOD_SESSION_SECRET:    ${SERVERPOD_SESSION_SECRET}
      STRIPE_SECRET_KEY:           ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:       ${STRIPE_WEBHOOK_SECRET}
      CLOUD_STORAGE_BUCKET:        ${CLOUD_STORAGE_BUCKET}
      CLOUD_STORAGE_KEY_ID:        ${CLOUD_STORAGE_KEY_ID}
      CLOUD_STORAGE_SECRET:        ${CLOUD_STORAGE_SECRET}
      FCM_SERVER_KEY:              ${FCM_SERVER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
      - "8081"  # insights
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [backend, frontend]
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 1G

  # ── Nginx (TLS termination + reverse proxy) ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks: [frontend]
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Backup service (runs on schedule) ─────────────────────────────────────
  backup:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER:     ${POSTGRES_USER:-mycosmetics}
      POSTGRES_DB:       ${POSTGRES_DB:-mycosmetics}
      POSTGRES_HOST:     postgres
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: ["sh", "/backup.sh"]
    networks: [backend]
    profiles: [backup]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
