version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password_CHANGE_ME
      POSTGRES_DB: mycosmetics
    ports:
      - '8090:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: redis-server --requirepass redis_dev_password_CHANGE_ME
    ports:
      - '8091:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  mycosmetics_server:
    build:
      context: ./mycosmetics_server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8080:8080'
      - '8081:8081'
      - '8082:8082'
    environment:
      - SERVERPOD_RUNMODE=development

volumes:
  pgdata:
