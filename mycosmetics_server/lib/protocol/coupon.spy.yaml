### usedCount is incremented atomically at order-creation time, not at
### apply-time, so a coupon "applied" to an abandoned cart never consumes
### its usage limit.
class: Coupon
table: coupons
fields:
  code: String
  type: CouponType
  value: double
  minSpend: double, default=0
  maxDiscount: double?
  usageLimit: int?
  usedCount: int, default=0
  expiresAt: DateTime?
  isActive: bool, default=true
  createdAt: DateTime
  updatedAt: DateTime
indexes:
  coupons_code_idx:
    fields: code
    unique: true
