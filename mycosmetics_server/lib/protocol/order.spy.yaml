### Money fields are all frozen at checkout time and never recomputed from
### live product/variant data afterward -- an order is a historical record,
### not a live view. couponId is kept (nullable) for traceability even
### though discountAmount is what actually matters for the order total.
### paymentStatus/paymentId/trackingNumber come from migration
### 00000000000006-production's ALTER TABLE orders.
class: Order
table: orders
fields:
  userId: int, relation(parent=users, onDelete=Restrict)
  addressId: int, relation(parent=addresses, onDelete=Restrict)
  couponId: int?, relation(parent=coupons, onDelete=SetNull)
  status: OrderStatus, default=pending
  paymentStatus: String, default='unpaid'
  paymentId: int?
  trackingNumber: String?
  subtotal: double
  discountAmount: double, default=0
  total: double
  createdAt: DateTime
  updatedAt: DateTime
indexes:
  orders_user_idx:
    fields: userId
  orders_status_idx:
    fields: status
