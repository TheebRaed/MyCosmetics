### Composed read-model so the client gets cart + live variant/product info
### + computed totals in one call instead of N follow-up requests.
class: CartItemDetail
fields:
  cartItem: CartItem
  productId: int
  productName: String
  shadeName: String?
  hexColor: String?
  imageUrl: String?
  unitPrice: double
  availableStock: int
  lineTotal: double
  isAvailable: bool
