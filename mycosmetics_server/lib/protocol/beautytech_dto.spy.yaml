class: RecommendationResult
fields:
  skinProfile: SkinProfile
  recommendations: List<ShadeRecommendationDetail>
  historyId: int

class: ShadeRecommendationDetail
fields:
  recommendation: ShadeRecommendation
  variantName: String?
  productName: String
  hexColor: String?
  imageUrl: String?
  scoreBreakdown: ScoreBreakdown?

class: ScoreBreakdown
fields:
  skinTone: double
  undertone: double
  popularity: double
  userPreference: double
  tryOnActivity: double
  finalScore: int

class: TryOnAnalyticsSummary
fields:
  totalSessions: int
  totalShadeApplications: int
  totalSavedLooks: int
  topVariants: List<VariantTryOnCount>

class: VariantTryOnCount
fields:
  variantId: int
  productName: String
  shadeName: String?
  hexColor: String?
  count: int

class: RecommendationAnalyticsSummary
fields:
  totalRecommendationSessions: int
  acceptanceRate: double
  conversionRate: double
  topRecommendedVariants: List<VariantTryOnCount>
  commonUndertones: List<UndertoneCount>

class: UndertoneCount
fields:
  undertone: String
  count: int
  percentage: double
