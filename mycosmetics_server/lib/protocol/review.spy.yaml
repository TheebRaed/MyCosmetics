### orderItemId is the enforcement mechanism for "only verified purchasers
### can review": a review must reference the specific order_item the user
### bought, and the service layer checks that order's status is Delivered.
### unique(userId, orderItemId) stops the same purchase being reviewed twice
### while still allowing a user to review the same product again from a
### different order.
class: Review
table: reviews
fields:
  productId: int, relation(parent=products, onDelete=Cascade)
  userId: int, relation(parent=users, onDelete=Cascade)
  orderItemId: int, relation(parent=order_items, onDelete=Cascade)
  rating: int
  comment: String?
  createdAt: DateTime
  updatedAt: DateTime
indexes:
  reviews_product_idx:
    fields: productId
  reviews_user_orderitem_idx:
    fields: userId, orderItemId
    unique: true
