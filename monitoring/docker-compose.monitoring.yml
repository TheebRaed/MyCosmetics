# Optional monitoring stack (deploy alongside main compose)
# Provides: Prometheus metrics + Grafana dashboards + Loki logs

version: '3.9'

services:

  prometheus:
    image: prom/prometheus:v2.50.1
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    networks: [monitoring]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:10.2.4
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: monitoring.mycosmetics.app
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: monitoring@mycosmetics.app
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks: [monitoring]
    ports: ["3000:3000"]
    depends_on: [prometheus]

  node-exporter:
    image: prom/node-exporter:v1.7.0
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|run)($$|/)
    networks: [monitoring]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    networks: [monitoring, backend]

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
  backend:
    external: true
    name: mycosmetics_backend
