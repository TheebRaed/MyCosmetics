# MyCosmetics Production Nginx Configuration
# TLS termination + reverse proxy + security headers

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain;
    client_max_body_size 10m;

    # ── Rate limiting zones ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=5r/m;

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream serverpod_api {
        least_conn;
        server api:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name api.mycosmetics.app;
        return 301 https://$server_name$request_uri;
    }

    # ── HTTPS API Server ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.mycosmetics.app;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS (2 years)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security headers ──────────────────────────────────────────────
        add_header X-Frame-Options           "DENY"                                          always;
        add_header X-Content-Type-Options    "nosniff"                                       always;
        add_header X-XSS-Protection          "1; mode=block"                                 always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
        add_header Content-Security-Policy   "default-src 'none'; connect-src 'self'"        always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"      always;

        # ── CORS ──────────────────────────────────────────────────────────
        # Allow Flutter mobile (no Origin) and the admin web dashboard
        add_header Access-Control-Allow-Origin  "https://admin.mycosmetics.app" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS"             always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type"    always;
        add_header Access-Control-Max-Age       "86400"                          always;

        # ── Auth endpoints — strict rate limit ────────────────────────────
        location ~ ^/(auth|password) {
            limit_req zone=api_auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://serverpod_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Upload endpoint ───────────────────────────────────────────────
        location /serverpod_cloud_storage/upload {
            limit_req zone=api_upload burst=3 nodelay;
            client_max_body_size 5m;
            proxy_pass http://serverpod_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Stripe webhooks — no rate limit, but signature verified in app ─
        location /webhooks/stripe {
            proxy_pass http://serverpod_api;
            proxy_set_header X-Stripe-Signature $http_stripe_signature;
            include /etc/nginx/conf.d/proxy_params.conf;
        }

        # ── Health check (no rate limit) ──────────────────────────────────
        location /health {
            proxy_pass http://serverpod_api;
            access_log off;
        }

        # ── General API ───────────────────────────────────────────────────
        location / {
            limit_req zone=api_general burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://serverpod_api;
            include /etc/nginx/conf.d/proxy_params.conf;
        }
    }
}
