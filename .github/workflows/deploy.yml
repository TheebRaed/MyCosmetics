name: CD — Deploy to Production

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mycosmetics-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./mycosmetics_server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/mycosmetics
            docker-compose -f docker-compose.prod.yml pull api
            docker-compose -f docker-compose.prod.yml up -d --no-deps api
            docker-compose -f docker-compose.prod.yml exec -T api ./bin/server --mode=production --apply-migrations
            echo "Staging deploy complete: $(date)"

      - name: Smoke test staging
        run: |
          sleep 15
          curl -f https://staging-api.mycosmetics.app/health || exit 1
          echo "Staging health check passed"

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production (rolling update)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/mycosmetics

            # Backup before deploy
            bash scripts/backup.sh

            # Pull new image
            docker-compose -f docker-compose.prod.yml pull api

            # Rolling restart (zero-downtime with replica=2)
            docker-compose -f docker-compose.prod.yml up -d --no-deps --scale api=2 api
            sleep 10

            # Run any new migrations
            docker-compose -f docker-compose.prod.yml exec -T api ./bin/server --mode=production --apply-migrations

            echo "Production deploy complete: $(date)"

      - name: Production health check
        run: |
          sleep 20
          curl -f https://api.mycosmetics.app/health || exit 1
          echo "Production health check PASSED"

      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{"text":"🚨 Production deploy FAILED for ${{ github.ref_name }}. Rollback required."}'

  rollback:
    name: Emergency Rollback
    needs: deploy-production
    if: failure()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Rollback to previous image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key:      ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/mycosmetics
            docker-compose -f docker-compose.prod.yml up -d --no-deps api
            echo "ROLLBACK COMPLETE: $(date)"
