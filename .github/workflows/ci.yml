name: CI — Test & Build

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Server tests ────────────────────────────────────────────────────────────
  server-test:
    name: Server — Dart Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mycosmetics_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Activate serverpod_cli
        run: dart pub global activate serverpod_cli 2.9.3

      - name: Install dependencies
        working-directory: ./mycosmetics_server
        run: dart pub get

      - name: Generate Serverpod client
        working-directory: ./mycosmetics_server
        run: dart pub global run serverpod_cli generate

      - name: Run migrations
        working-directory: ./mycosmetics_server
        env:
          SERVERPOD_DATABASE_HOST: localhost
          SERVERPOD_DATABASE_NAME: mycosmetics_test
          SERVERPOD_DATABASE_USER: postgres
          SERVERPOD_DATABASE_PASS: testpassword
          SERVERPOD_REDIS_HOST: localhost
          SERVERPOD_SESSION_SECRET: test-secret-key
        run: dart run bin/main.dart --mode=test --apply-migrations

      - name: Run unit tests
        working-directory: ./mycosmetics_server
        env:
          SERVERPOD_DATABASE_HOST: localhost
          SERVERPOD_DATABASE_NAME: mycosmetics_test
          SERVERPOD_DATABASE_USER: postgres
          SERVERPOD_DATABASE_PASS: testpassword
          SERVERPOD_REDIS_HOST: localhost
          SERVERPOD_SESSION_SECRET: test-secret-key
        run: dart test test/ --reporter=github

      - name: Analyze code
        working-directory: ./mycosmetics_server
        run: dart analyze --fatal-warnings

  # ── Flutter tests ───────────────────────────────────────────────────────────
  flutter-test:
    name: Flutter — Widget & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Activate serverpod_cli
        run: dart pub global activate serverpod_cli 2.9.3

      - name: Install server dependencies
        working-directory: ./mycosmetics_server
        run: dart pub get

      - name: Generate Serverpod client
        working-directory: ./mycosmetics_server
        run: dart pub global run serverpod_cli generate

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Install dependencies (customer app)
        working-directory: ./mycosmetics_flutter
        run: flutter pub get

      - name: Run Flutter tests
        working-directory: ./mycosmetics_flutter
        run: flutter test --reporter=github

      - name: Analyze Flutter code
        working-directory: ./mycosmetics_flutter
        run: flutter analyze --fatal-warnings

      - name: Install dependencies (admin app)
        working-directory: ./mycosmetics_admin
        run: flutter pub get

      - name: Analyze admin code
        working-directory: ./mycosmetics_admin
        run: flutter analyze --fatal-warnings

  # ── Docker build verification ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [server-test]
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - name: Activate serverpod_cli
        run: dart pub global activate serverpod_cli 2.9.3
      - name: Install server dependencies
        working-directory: ./mycosmetics_server
        run: dart pub get
      - name: Generate Serverpod client
        working-directory: ./mycosmetics_server
        run: dart pub global run serverpod_cli generate
      - name: Build server Docker image
        run: docker build -f mycosmetics_server/Dockerfile -t mycosmetics-api:ci .
      - name: Run container health check
        run: |
          docker run -d --name test-api \
            -e SERVERPOD_DATABASE_HOST=localhost \
            -e SERVERPOD_DATABASE_NAME=test \
            -e SERVERPOD_DATABASE_USER=postgres \
            -e SERVERPOD_DATABASE_PASS=test \
            -e SERVERPOD_REDIS_HOST=localhost \
            -e SERVERPOD_SESSION_SECRET=test \
            -p 8080:8080 mycosmetics-api:ci
          sleep 5
          docker stop test-api || true

  # ── Security scan ───────────────────────────────────────────────────────────
  security-scan:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with: { sdk: stable }
      - name: Activate serverpod_cli
        run: dart pub global activate serverpod_cli 2.9.3
      - name: Install server dependencies
        working-directory: ./mycosmetics_server
        run: dart pub get
      - name: Generate Serverpod client
        working-directory: ./mycosmetics_server
        run: dart pub global run serverpod_cli generate
      - name: Check for known vulnerabilities
        working-directory: ./mycosmetics_server
        run: dart pub outdated --show-all
      - uses: subosito/flutter-action@v2
        with: { flutter-version: '3.22.x', channel: stable }
      - name: Flutter dependency audit
        working-directory: ./mycosmetics_flutter
        run: flutter pub outdated --show-all
